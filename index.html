<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래 가치 비교</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    background-color: #000000;
    margin: 0;
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 16px 80px;
  }

  /* 얇은 캡슐형 스크롤바 (공통), 화살표 버튼 제거 */
  .frame-scroll, .popup-grid {
    scrollbar-width: thin;
    scrollbar-color: #3a3a3a transparent;
  }
  .frame-scroll::-webkit-scrollbar, .popup-grid::-webkit-scrollbar { width: 5px; }
  .frame-scroll::-webkit-scrollbar-track, .popup-grid::-webkit-scrollbar-track { background: transparent; }
  .frame-scroll::-webkit-scrollbar-thumb, .popup-grid::-webkit-scrollbar-thumb {
    background-color: #3a3a3a;
    border-radius: 999px;
  }
  .frame-scroll::-webkit-scrollbar-button, .popup-grid::-webkit-scrollbar-button {
    display: none;
    width: 0;
    height: 0;
  }

  .box {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 800px));
    justify-content: center;
    column-gap: clamp(6px, 7vw, 60px);
    row-gap: 40px;
    width: 100%;
  }

  .side {
    display: flex;
    flex-direction: column;
    width: 100%;
    min-width: 0;
  }

  /* 화면이 좁아지면 좌우 배치 대신 위아래로 쌓아서, 각 프레임이 화면 폭을 최대한 확보하게 함 */
  @media (max-width: 800px) {
    .box {
      grid-template-columns: 1fr;
      row-gap: 32px;
    }
    .header-row.right {
      justify-content: flex-start;
    }
  }

  .header-row {
    width: 100%;
    max-width: 800px;
    display: flex;
    align-items: center;
    padding-bottom: 8px;
  }
  .header-row.right { justify-content: flex-end; }
  .header-text {
    color: #F3F3F3;
    font-family: 'Pretendard', sans-serif;
    font-size: clamp(22px, 6vw, 50px);
    font-weight: 700;
    margin: 0;
  }

  /* 프레임 - 너무 작아지지 않도록 최소 너비 지정 */
  .frame {
    position: relative;
    width: 100%;
    max-width: 800px;
    min-width: 200px;
    aspect-ratio: 800 / 450;
    border-radius: 20px;
    background-color: #121212;
    overflow: hidden;
  }

  .frame-scroll {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 18px; /* 좌우 대칭. 스크롤바(5px)는 이 안쪽에 자연스럽게 위치 */
  }

  /* 프레임 안 격자: 4열 x 2행 = 8개가 기본, 9개부터 스크롤 */
  .item-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(6px, 4%, 24px);
    width: 100%;
    align-content: start;
    justify-content: start;
  }

  .grid-cell {
    aspect-ratio: 1 / 1;
    background-color: #1F1F1F;
    border-radius: 18%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: background-color 0.15s;
    color: #F3F3F3;
    font-size: clamp(9px, 1.6vw, 13px);
    overflow: hidden;
    position: relative;
  }
  .grid-cell:hover { background-color: #2a2a2a; }

  .add-btn svg {
    width: 36%;
    height: 36%;
    stroke: #f3f3f3;
  }

  .grid-cell .item-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
  .grid-cell .item-label {
    position: absolute;
    bottom: 4%;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 9%;
    gap: 4px;
  }
  .item-label .name {
    color: #F3F3F3;
    font-size: clamp(11px, 2vw, 15px);
    font-weight: 600;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-label .qty {
    color: #ffffff;
    font-size: clamp(11px, 2vw, 15px);
    font-weight: 700;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    flex-shrink: 0;
  }

  /* 비교하기 버튼 - 캡슐, 거래창 아래 50px */
  .compare-btn {
    margin-top: 50px;
    background-color: #121212;
    color: #ffffff;
    font-weight: 700;
    font-size: clamp(17px, 2.4vw, 22px);
    padding: clamp(18px, 2.6vw, 22px) clamp(50px, 8vw, 72px);
    border-radius: 999px;
    cursor: pointer;
    text-align: center;
  }
  .compare-btn:hover { background-color: #1c1c1c; }

  /* 아이템 선택 팝업 */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .overlay.show { display: flex; }

  .popup {
    width: 400px;
    height: 500px;
    max-width: 90vw;
    max-height: 85vh;
    background-color: #121212;
    border-radius: 20px;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }
  .popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .popup h3 {
    color: #F3F3F3;
    font-size: 18px;
    margin: 0;
  }

  .search-capsule {
    position: relative;
    background-color: #1F1F1F;
    border-radius: 999px;
    height: 30px;
    width: 150px;
    cursor: pointer;
    overflow: hidden;
  }
  .search-icon {
    position: absolute;
    top: 50%;
    left: 123px; /* 오른쪽에 위치 (150 - 12padding - 15icon) */
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    stroke: #F3F3F3;
    transition: left 0.2s ease;
  }
  .search-capsule.active .search-icon {
    left: 12px; /* 왼쪽으로 이동 */
  }
  .search-input {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    border: none;
    outline: none;
    background: transparent;
    color: #F3F3F3;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    width: 0;
    opacity: 0;
    pointer-events: none;
    transition: width 0.2s ease, opacity 0.2s ease, left 0.2s ease;
  }
  .search-capsule.active .search-input {
    left: 35px;
    width: 103px;
    opacity: 1;
    pointer-events: auto;
  }

  .popup-grid {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    column-gap: 12px;
    row-gap: 22px;
    align-content: start;
    padding-right: 4px;
  }

  .pop-cell {
    position: relative;
    background-color: #1F1F1F;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 12px;
    overflow: hidden;
    cursor: default;
  }
  .pop-img-wrap {
    width: 112px;
    height: 112px;
    flex-shrink: 0;
    background-color: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #5a5a5a;
    font-size: 9px;
  }
  .pop-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .pop-name {
    color: #F3F3F3;
    font-size: 12px;
    line-height: 1.3;
    text-align: center;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    max-width: 100%;
    flex-shrink: 0;
  }

  /* 호버 시 수량 선택 패널 */
  .pop-hover {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .pop-cell:hover .pop-hover {
    opacity: 1;
    pointer-events: auto;
  }
  .qty-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .qty-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background-color: #3a3a3a;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    cursor: pointer;
    user-select: none;
  }
  .qty-btn:hover { background-color: #4a4a4a; }
  .qty-value {
    color: #ffffff;
    font-size: 14px;
    min-width: 18px;
    text-align: center;
  }
  .qty-add {
    background-color: #F3F3F3;
    color: #000000;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 999px;
    cursor: pointer;
  }
  .qty-add:hover { background-color: #ffffff; }

  .popup-close {
    margin-top: 14px;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    background-color: #333333;
    color: #F3F3F3;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* 결과 팝업 */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }
  .result-overlay.show { display: flex; }

  .result-box {
    background-color: #121212;
    border-radius: 20px;
    padding: 32px;
    width: 300px;
    max-width: 85vw;
    text-align: center;
  }
  .result-title {
    color: #F3F3F3;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .result-detail {
    color: #aaaaaa;
    font-size: 14px;
    margin-bottom: 20px;
    line-height: 1.6;
  }
</style>
</head>
<body>

  <div class="box">
    <div class="side">
      <div class="header-row"><p class="header-text">나</p></div>
      <div class="frame" id="frame-me">
        <div class="frame-scroll">
          <div class="item-grid" id="grid-me">
            <div class="grid-cell add-btn" onclick="openPopup('me')">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="side">
      <div class="header-row right"><p class="header-text">상대</p></div>
      <div class="frame" id="frame-opp">
        <div class="frame-scroll">
          <div class="item-grid" id="grid-opp">
            <div class="grid-cell add-btn" onclick="openPopup('opp')">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="compare-btn" onclick="compareValues()">비교하기</div>

  <!-- 아이템 선택 팝업 -->
  <div class="overlay" id="overlay">
    <div class="popup">
      <div class="popup-header">
        <h3>아이템 선택</h3>
        <div class="search-capsule" id="searchCapsule" onclick="activateSearch()">
          <input type="text" id="searchInput" class="search-input" oninput="filterItems()" onclick="event.stopPropagation()">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke-width="2">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
      </div>
      <div class="popup-grid" id="popup-grid"></div>
      <div class="popup-close" onclick="closePopup()">닫기</div>
    </div>
  </div>

  <!-- 결과 팝업 -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-box">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-detail" id="resultDetail"></div>
      <div class="popup-close" onclick="closeResult()">확인</div>
    </div>
  </div>

<script>
  // ===================================================================
  // 구글 시트 연동 설정
  // 1) 구글 시트에 name, value, image (열 헤더) 로 데이터를 입력하세요.
  // 2) 파일 > 공유 > 웹에 게시 > 형식: CSV 선택 후 게시
  // 3) 생성된 링크를 아래 CSV_URL에 붙여넣으세요. (비워두면 기본 예시 데이터 사용)
  // ===================================================================
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1HPLaH_QRVtLhTqhjDiym6tOb2hexzd_cmLuVlZJYGl8EQvqlyOVS-PAUhMjZZIT93mKgRZinj5kz/pub?output=csv";

  // 카테고리 3종류: 가치 / 처분 / 현금가 (조사는 받침 유무에 맞게 미리 지정)
  const CATEGORIES = [
    { key: "value1", label: "가치", topic: "가치는" },
    { key: "value2", label: "처분", topic: "처분은" },
    { key: "value3", label: "현금가", topic: "현금가는" },
  ];

  // 페이지 로드 시 시트 연결 전까지는 빈 상태로 시작 (예전 테스트 데이터가 잠깐 보이는 문제 방지)
  let ITEMS = [];

  // 시트 연결 실패 시에만 쓰이는 비상용 백업 데이터
  const FALLBACK_ITEMS = [
    { name: "신성", value1: 12,  value2: 12,    value3: 12,  image: "https://i.postimg.cc/XNkZP5RH/jemog-eul-iblyeoghaejuseyo-(5).png" },
    { name: "요정", value1: 13,  value2: 13,    value3: 13,  image: "https://i.postimg.cc/XNkZP5RH/jemog-eul-iblyeoghaejuseyo-(5).png" },
    { name: "3",   value1: 231, value2: 32,    value3: 32,  image: "" },
    { name: "4",   value1: 12,  value2: 23,    value3: 23,  image: "" },
    { name: "9",   value1: 23,  value2: 23,    value3: 23,  image: "" },
    { name: "5",   value1: 23,  value2: 23,    value3: 23,  image: "" },
    { name: "7",   value1: 313, value2: 12122, value3: 112, image: "" },
    { name: "8",   value1: 213, value2: 123,   value3: 123, image: "" },
  ];

  async function loadItemsFromSheet() {
    if (!CSV_URL) {
      ITEMS = FALLBACK_ITEMS;
      return;
    }
    try {
      const res = await fetch(CSV_URL);
      const csvText = await res.text();
      const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
      // 시트 컬럼: Item, Values(가치), Values2(처분), Money(현금가), Images
      ITEMS = parsed.data.map(row => ({
        name: row.Item || "이름없음",
        value1: Number(row.Values) || 0,
        value2: Number(row.Values2) || 0,
        value3: Number(row.Money) || 0,
        image: row.Images || ""
      }));
    } catch (err) {
      console.error("구글 시트 로드 실패, 백업 데이터 사용:", err);
      ITEMS = FALLBACK_ITEMS;
    }
  }

  const state = { me: [], opp: [] };   // 각 항목: { name, value1, value2, value3, image, qty }
  let activeSide = null;
  let tempQty = {};

  function openPopup(side) {
    activeSide = side;
    tempQty = {};

    // 검색창 초기화
    const capsule = document.getElementById('searchCapsule');
    const input = document.getElementById('searchInput');
    capsule.classList.remove('active');
    input.value = '';

    renderPopupGrid(ITEMS);
    document.getElementById('overlay').classList.add('show');
  }

  function renderPopupGrid(items) {
    const grid = document.getElementById('popup-grid');
    grid.innerHTML = '';

    if (items.length === 0) {
      grid.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; color:#888; font-size:13px; padding-top:20px;">검색 결과가 없습니다</div>`;
      return;
    }

    items.forEach((item) => {
      const idx = ITEMS.indexOf(item); // ITEMS 원본 배열 기준 인덱스 (수량/추가 로직 유지용)
      if (tempQty[idx] === undefined) tempQty[idx] = 1;

      const cell = document.createElement('div');
      cell.className = 'pop-cell';

      const imgHtml = item.image
        ? `<img src="${item.image}" onerror="this.style.display='none'">`
        : '';

      cell.innerHTML = `
        <div class="pop-img-wrap">${imgHtml}</div>
        <div class="pop-name">${item.name}</div>
        <div class="pop-hover">
          <div class="qty-row">
            <div class="qty-btn minus">-</div>
            <div class="qty-value">${tempQty[idx]}</div>
            <div class="qty-btn plus">+</div>
          </div>
          <div class="qty-add">추가</div>
        </div>
      `;

      const qtyValueEl = cell.querySelector('.qty-value');
      cell.querySelector('.minus').onclick = (e) => {
        e.stopPropagation();
        tempQty[idx] = Math.max(1, tempQty[idx] - 1);
        qtyValueEl.textContent = tempQty[idx];
      };
      cell.querySelector('.plus').onclick = (e) => {
        e.stopPropagation();
        tempQty[idx] = tempQty[idx] + 1;
        qtyValueEl.textContent = tempQty[idx];
      };
      cell.querySelector('.qty-add').onclick = (e) => {
        e.stopPropagation();
        addItem(activeSide, idx, tempQty[idx]);
        tempQty[idx] = 1;
        qtyValueEl.textContent = 1;
      };

      grid.appendChild(cell);
    });
  }

  function activateSearch() {
    const capsule = document.getElementById('searchCapsule');
    if (!capsule.classList.contains('active')) {
      capsule.classList.add('active');
      document.getElementById('searchInput').focus();
    }
  }

  // 검색창 밖을 클릭하면 원래 상태(돋보기 오른쪽)로 복귀
  document.addEventListener('click', function(e) {
    const capsule = document.getElementById('searchCapsule');
    if (capsule && !capsule.contains(e.target)) {
      capsule.classList.remove('active');
    }
  });

  function filterItems() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!keyword) {
      renderPopupGrid(ITEMS);
      return;
    }
    const filtered = ITEMS.filter(item => item.name.toLowerCase().includes(keyword));
    renderPopupGrid(filtered);
  }

  function closePopup() {
    document.getElementById('overlay').classList.remove('show');
  }

  function addItem(side, idx, qty) {
    const item = ITEMS[idx];
    const existing = state[side].find(i => i.name === item.name);
    if (existing) {
      existing.qty += qty;
    } else {
      state[side].push({ ...item, qty });
    }
    renderGrid(side);
  }

  function removeItem(side, idx) {
    state[side].splice(idx, 1);
    renderGrid(side);
  }

  function renderGrid(side) {
    const gridEl = document.getElementById(side === 'me' ? 'grid-me' : 'grid-opp');
    gridEl.innerHTML = `
      <div class="grid-cell add-btn" onclick="openPopup('${side}')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </div>
    `;
    state[side].forEach((item, idx) => {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.onclick = () => removeItem(side, idx);

      const imgHtml = item.image
        ? `<img class="item-img" src="${item.image}" onerror="this.style.display='none'">`
        : '';

      cell.innerHTML = `
        ${imgHtml}
        <div class="item-label">
          <span class="name">${item.name}</span>
          <span class="qty">x${item.qty}</span>
        </div>
      `;
      gridEl.appendChild(cell);
    });
  }

  function compareValues() {
    const titleEl = document.getElementById('resultTitle');
    const detailEl = document.getElementById('resultDetail');

    titleEl.textContent = '거래 분석 결과';

    const rows = CATEGORIES.map(cat => {
      const meTotal = state.me.reduce((s, i) => s + (i[cat.key] || 0) * i.qty, 0);
      const oppTotal = state.opp.reduce((s, i) => s + (i[cat.key] || 0) * i.qty, 0);
      const diff = oppTotal - meTotal; // 내가 받는 것(상대) - 내가 주는 것(나) = 내 순이익

      let resultText;
      if (diff === 0) {
        resultText = `${cat.topic} 동일합니다`;
      } else if (diff > 0) {
        resultText = `${cat.topic} ${diff}이득 입니다`;
      } else {
        resultText = `${cat.topic} ${Math.abs(diff)}손해 입니다`;
      }
      return resultText;
    });

    detailEl.innerHTML = rows.join('<br>');
    document.getElementById('resultOverlay').classList.add('show');
  }

  function closeResult() {
    document.getElementById('resultOverlay').classList.remove('show');
  }

  loadItemsFromSheet();
</script>

</body>
</html>
